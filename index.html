<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Essentials for Leaders — Web Activities</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; max-width: 640px;
           margin: 8vh auto; padding: 0 24px; line-height: 1.6; color: #1a1a1a; }
    h1 { font-size: 1.5rem; }
    .sub { color: #666; margin-top: -0.5rem; }
    ul { list-style: none; padding: 0; }
    li { margin: 1rem 0; }
    a.card { display: block; padding: 1rem 1.25rem; border: 1px solid #ddd; border-radius: 10px;
             text-decoration: none; color: inherit; transition: border-color .15s, box-shadow .15s; }
    a.card:hover { border-color: #0057b8; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    a.card strong { display: block; font-size: 1.05rem; }
    a.card span { color: #666; font-size: .9rem; }
    @media (prefers-color-scheme: dark) {
      body { color: #eee; background: #111; }
      a.card { border-color: #333; }
      .sub, a.card span { color: #aaa; }
    }
  </style>
</head>
<body>
  <h1>AI Essentials for Leaders</h1>
  <p class="sub">Interactive web activities</p>
  <ul>
    <li>
      <a class="card" href="scalinglaw/">
        <strong>Scaling Law Activity</strong>
        <span>Explore how model performance scales with data and parameters</span>
      </a>
    </li>
    <li>
      <a class="card" href="roc/">

      </a>
    </li>
  </ul>
